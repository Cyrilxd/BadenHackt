services:
  backend:
    build: ./backend
    container_name: internet-control-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/internet_control.db}
      - DATABASE_PATH=${DATABASE_PATH:-/app/data/internet_control.db}
      - SECRET_KEY=${SECRET_KEY:-hackathon-2026-change-in-production}
      - AUTH_MODE=${AUTH_MODE:-ldap}
      - LDAP_HOST=${LDAP_HOST:-ldap}
      - LDAP_PORT=${LDAP_PORT:-389}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=hackathon,dc=local}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-cn=admin,dc=hackathon,dc=local}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-admin}
      - LDAP_USER_SEARCH_BASE=${LDAP_USER_SEARCH_BASE:-ou=users,dc=hackathon,dc=local}
      - LDAP_USER_SEARCH_FILTER=${LDAP_USER_SEARCH_FILTER:-(uid={username})}
      - FIREWALL_API_URL=${FIREWALL_API_URL:-http://shorewall-mock:8080}
      - FIREWALL_API_TOKEN=${FIREWALL_API_TOKEN:-hackathon-firewall-token}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
    depends_on:
      ldap:
        condition: service_healthy
      shorewall-mock:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: internet-control-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  ldap:
    build:
      context: ./docker/openldap
      dockerfile: Dockerfile
    container_name: internet-control-ldap
    ports:
      - "389:389"
    environment:
      - LDAP_ORGANISATION=Baden Hackt
      - LDAP_DOMAIN=hackathon.local
      - LDAP_ADMIN_PASSWORD=admin
      - LDAP_CONFIG_PASSWORD=config
      - LDAP_TLS=false
      - KEEP_EXISTING_CONFIG=false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ldapwhoami -x -H ldap://localhost:389 -D 'cn=admin,dc=hackathon,dc=local' -w admin >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  shorewall-mock:
    build:
      context: ./firewall-agent
      dockerfile: Dockerfile
    container_name: internet-control-shorewall-mock
    ports:
      - "8081:8080"
    volumes:
      - ./data/firewall-agent:/app/data
    environment:
      - FIREWALL_DRIVER=${FIREWALL_DRIVER:-mock}
      - FIREWALL_API_TOKEN=${FIREWALL_API_TOKEN:-hackathon-firewall-token}
      - STATE_PATH=${STATE_PATH:-/app/data/firewall-state.json}
      - MOCK_OUTPUT_DIR=${MOCK_OUTPUT_DIR:-/app/data/mock}
      - SHOREWALL_SOURCE_ZONE=${SHOREWALL_SOURCE_ZONE:-loc}
      - SHOREWALL_DEST_ZONE=${SHOREWALL_DEST_ZONE:-net}
      - SHOREWALL_RULES_FILE=${SHOREWALL_RULES_FILE:-/etc/shorewall/rules}
      - SHOREWALL_MANAGED_RULES_FILE=${SHOREWALL_MANAGED_RULES_FILE:-/etc/shorewall/rules.d/badenhackt.rules}
    restart: unless-stopped
