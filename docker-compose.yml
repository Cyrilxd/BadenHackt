services:
  backend:
    build: ./backend
    container_name: internet-control-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-hackathon-2026-change-in-production}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: internet-control-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
